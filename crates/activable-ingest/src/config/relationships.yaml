  - name: "instance-security-group"
    from_label: "Resource"
    to_label: "SecurityGroup"
    edge_type: "HasSecurityGroup"
    from_property: "security_group_id"
    to_property: "id"

  - name: "permission-acts-on-secret"
    from_label: "Permission"
    to_label: "Secret"
    edge_type: "ActsOn"
    from_property: "resource"
    to_property: "id"
