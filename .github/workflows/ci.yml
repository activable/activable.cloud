name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]

jobs:
  lint-rust:
    name: Lint Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.23"
      - uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: ./go

  build-rust:
    name: Build Rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace --release
      - name: Upload Rust artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-build-${{ matrix.os }}
          path: target/release/libactivable_ffi*
          retention-days: 1

  test-rust:
    name: Test Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  bindgen-drift:
    name: Check UniFFI Bindgen Drift
    runs-on: ubuntu-latest
    needs: build-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v4
        with:
          go-version: "1.23"
      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          name: rust-build-ubuntu-latest
          path: target/release/
      - name: Install uniffi-bindgen-go
        run: |
          cargo install --git https://github.com/NordSecurity/uniffi-bindgen-go --tag "v0.7.1+v0.31.0" uniffi-bindgen-go --locked
      - name: Regenerate bindings
        run: |
          mkdir -p bindings/activable
          uniffi-bindgen-go --library target/release/libactivable_ffi.so --out-dir bindings/
      - name: Check for drift
        run: |
          if git diff --exit-code bindings/; then
            echo "Bindings are in sync"
          else
            echo "Error: Generated bindings differ from committed bindings"
            echo "Run 'make bindgen' and commit the changes"
            git diff bindings/
            exit 1
          fi

  test-go:
    name: Test Go
    runs-on: ubuntu-latest
    needs: [build-rust, bindgen-drift]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.23"
      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          name: rust-build-ubuntu-latest
          path: target/release/
      - name: Run Go tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          CGO_LDFLAGS: -L${{ github.workspace }}/target/release
        run: go test -race -v ./go/...

  ffi-stability:
    name: FFI Stability Test
    runs-on: ubuntu-latest
    needs: [build-rust, bindgen-drift]
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.23"
      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          name: rust-build-ubuntu-latest
          path: target/release/
      - name: Run FFI stability test
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          CGO_LDFLAGS: -L${{ github.workspace }}/target/release
        run: go test -race -count=10 -timeout=60s ./go/cmd/activable/...

  size-check:
    name: Binary Size Check
    runs-on: ubuntu-latest
    needs: [build-rust, bindgen-drift]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "1.23"
      - name: Download Rust artifacts
        uses: actions/download-artifact@v4
        with:
          name: rust-build-ubuntu-latest
          path: target/release/
      - name: Build activable binary
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/target/release
          CGO_LDFLAGS: -L${{ github.workspace }}/target/release
        run: |
          mkdir -p go/bin
          CGO_ENABLED=1 go build -o go/bin/activable ./go/cmd/activable
      - run: bash scripts/size-check.sh go/bin/activable
