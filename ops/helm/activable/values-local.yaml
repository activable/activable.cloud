# Local Kubernetes development values — ALL services run in K8s
# Use with: helm install activable ops/helm/activable -f ops/helm/activable/values-local.yaml
#
# Deploys: Postgres+AGE (StatefulSet) + LocalStack v4.7+ (Deployment) + Activable GraphQL API
# Zero Docker Compose. Everything on Docker Desktop Kubernetes.

replicaCount: 1

image:
  repository: activable-server
  pullPolicy: Never  # Use locally built image (docker build -t activable-server:dev)
  tag: "dev"

service:
  type: NodePort
  port: 8080
  targetPort: 8080
  nodePort: 30080

route:
  enabled: true
  gatewayName: "activable-gateway"
  gatewayNamespace: "envoy-gateway-system"
  hostname: "activable.localtest.me"

# Database points to K8s-internal Postgres service
database:
  host: "activable-postgres"
  port: 5432
  name: "activable"
  user: "activable"
  sslMode: "disable"

graphql:
  port: 8080
  maxConnections: 10
  logLevel: "debug"
  graphName: "cloud"

# Enable Postgres+AGE in K8s (StatefulSet)
postgres:
  enabled: true
  image: "apache/age:release_PG16_1.6.0"
  user: "activable"
  database: "activable"
  storageSize: "2Gi"

# Enable LocalStack v4.7+ AWS emulator in K8s (Deployment)
localstack:
  enabled: true
  image: "localstack/localstack:4.7"
  region: "us-east-1"
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2"

# Environment variables injected into the Activable server pod
environment:
  ACTIVABLE_DB_URL: "postgresql://activable:activable_dev@activable-postgres:5432/activable?sslmode=disable"
  ACTIVABLE_GRAPH_NAME: "cloud"
  ACTIVABLE_POOL_SIZE: "10"
  ACTIVABLE_BATCH_SIZE: "500"
  ACTIVABLE_REGIONS: "us-east-1"
  AWS_ENDPOINT_URL: "http://activable-localstack:4566"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  AWS_DEFAULT_REGION: "us-east-1"
  INGEST_ACCOUNT_IDS: "111111111111,222222222222,333333333333,444444444444"

# Disable security context for local dev (AGE image runs as root)
securityContext: {}
podSecurityContext: {}

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
