{{- if .Values.localstack.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "activable.fullname" . }}-localstack
  labels:
    {{- include "activable.labels" . | nindent 4 }}
    app.kubernetes.io/component: aws-emulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: aws-emulator
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: aws-emulator
    spec:
      containers:
      - name: localstack
        image: {{ .Values.localstack.image | default "localstack/localstack:4.7" }}
        ports:
        - containerPort: 4566
          name: aws
        env:
        - name: LOCALSTACK_HOST
          value: {{ include "activable.fullname" . }}-localstack
        - name: SERVICES
          value: "iam,sts,s3,ec2,lambda,kms,organizations,cloudformation"
        - name: ALLOW_NONSTANDARD_REGIONS
          value: "1"
        - name: DEBUG
          value: "0"
        readinessProbe:
          httpGet:
            path: /_localstack/health
            port: 4566
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: {{ .Values.localstack.resources.requests.memory | default "512Mi" }}
            cpu: {{ .Values.localstack.resources.requests.cpu | default "500m" }}
          limits:
            memory: {{ .Values.localstack.resources.limits.memory | default "2Gi" }}
            cpu: {{ .Values.localstack.resources.limits.cpu | default "2" }}
{{- end }}
