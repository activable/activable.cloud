{{- if .Values.floci.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "activable.fullname" . }}-floci
  labels:
    {{- include "activable.labels" . | nindent 4 }}
    app.kubernetes.io/component: aws-emulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: aws-emulator
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: aws-emulator
    spec:
      containers:
      - name: floci
        image: {{ .Values.floci.image | default "floci/floci:latest" }}
        ports:
        - containerPort: 4566
          name: floci
        env:
        - name: FLOCI_HOSTNAME
          value: {{ include "activable.fullname" . }}-floci
        - name: FLOCI_DEFAULT_REGION
          value: {{ .Values.floci.region | default "us-east-1" }}
        - name: FLOCI_DEFAULT_ACCOUNT_ID
          value: {{ .Values.floci.accountId | default "000000000000" | quote }}
        - name: DEBUG
          value: "0"
        readinessProbe:
          httpGet:
            path: /_floci/health
            port: 4566
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: {{ .Values.floci.resources.requests.memory | default "256Mi" }}
            cpu: {{ .Values.floci.resources.requests.cpu | default "250m" }}
          limits:
            memory: {{ .Values.floci.resources.limits.memory | default "1Gi" }}
            cpu: {{ .Values.floci.resources.limits.cpu | default "1" }}
{{- end }}
