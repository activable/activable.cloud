apiVersion: v1
kind: Secret
metadata:
  name: {{ include "activable.fullname" . }}-secret
  labels:
    {{- include "activable.labels" . | nindent 4 }}
type: Opaque
data:
  db.user: {{ .Values.database.username | default "activable" | b64enc | quote }}
  db.password: {{ required "database.password is required — set via --set database.password=<value>" .Values.database.password | b64enc | quote }}
