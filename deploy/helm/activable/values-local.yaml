# Local Kubernetes development values
# Use with: helm install activable deploy/helm/activable -f deploy/helm/activable/values-local.yaml
#
# This configuration runs the Activable GraphQL API in Docker Desktop Kubernetes,
# while Postgres+AGE and Floci (AWS emulator) run in Docker Compose on the host.
# The K8s pod reaches host services via host.docker.internal (Docker Desktop built-in).

replicaCount: 1

image:
  # Locally-built image via: docker build -t activable/activable-server:latest -f deploy/docker/Dockerfile .
  repository: activable/activable-server
  pullPolicy: Never
  tag: "latest"

service:
  type: NodePort
  port: 8080
  targetPort: 8080
  nodePort: 30080  # Access GraphQL API at http://localhost:30080

ingress:
  enabled: false

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false

# Database runs in Docker Compose (not in K8s)
# K8s pods reach it via host.docker.internal (Docker Desktop networking)
database:
  host: "host.docker.internal"
  port: 5433
  name: "activable"
  sslMode: "disable"
  username: "activable"
  password: "activable_dev"

# GraphQL API configuration
graphql:
  port: 8080
  maxConnections: 50
  logLevel: "debug"
  graphName: "cloud"

# AWS endpoint and credentials for Floci (mock AWS)
# Pod reaches floci via host.docker.internal (Docker Compose network)
environment:
  ACTIVABLE_LOCAL_DEV: "1"
  AWS_ENDPOINT_URL: "http://host.docker.internal:4566"
  AWS_REGION: "us-east-1"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  ACTIVABLE_BATCH_SIZE: "500"
  ACTIVABLE_REGIONS: "us-east-1"

securityContext:
  runAsNonRoot: false
  runAsUser: 0
  allowPrivilegeEscalation: true

podSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  fsGroup: 0
