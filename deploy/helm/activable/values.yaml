replicaCount: 2

image:
  repository: activable/activable-server
  pullPolicy: IfNotPresent
  tag: "0.2.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: activable.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Database configuration
database:
  host: "postgres"
  port: 5432
  name: "activable"
  sslMode: "disable"

# GraphQL configuration
graphql:
  port: 8080
  maxConnections: 20
  logLevel: "info"
  graphName: "activable"

# Security
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add: []

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Postgres+AGE (disabled in production — use managed RDS)
postgres:
  enabled: false
  image: "apache/age:release_PG16_1.6.0"
  user: "activable"
  database: "activable"
  storageSize: "5Gi"

# Floci AWS emulator (disabled in production — use real AWS)
floci:
  enabled: false
  image: "floci/floci:latest"
  region: "us-east-1"
  accountId: "000000000000"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1"
