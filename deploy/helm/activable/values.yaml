replicaCount: 2

image:
  repository: activable/activable-server
  pullPolicy: IfNotPresent
  tag: "0.2.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

route:
  enabled: false
  gatewayName: "activable-gateway"
  gatewayNamespace: "envoy-gateway-system"
  hostname: "activable.example.com"

resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 500m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Database configuration
database:
  host: "postgres"
  port: 5432
  name: "activable"
  sslMode: "disable"

# GraphQL configuration
graphql:
  port: 8080
  maxConnections: 20
  logLevel: "info"
  graphName: "activable"

# Security
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add: []

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Postgres+AGE (disabled in production — use managed RDS)
postgres:
  enabled: false
  image: "apache/age:release_PG16_1.6.0"
  user: "activable"
  database: "activable"
  storageSize: "5Gi"

# LocalStack AWS emulator (disabled in production — use real AWS)
localstack:
  enabled: false
  image: "localstack/localstack:4.7"
  region: "us-east-1"
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "2"
